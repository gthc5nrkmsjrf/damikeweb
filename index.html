          <iframe class="webframe" id="webframe"></iframe>
  <input type="text" class="url" name="fname"></input>
  <script>
    window.addEventListener("DOMContentLoaded", function () {
  document.querySelector('.url').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') {
      e.preventDefault();

      let value = this.value;

      // auto add https://
      if (
        !value.startsWith('http://') &&
        !value.startsWith('https://')
      ) {
        value = 'https://' + value;
      }

      // YouTube watch link -> embed link
      if (value.includes('youtube.com/watch?v=')) {
        let id = new URL(value).searchParams.get('v');
        value = 'https://www.youtube.com/embed/' + id;
      }

      // youtu.be short link -> embed link
      if (value.includes('youtu.be/')) {
        let id = value.split('youtu.be/')[1];
        value = 'https://www.youtube.com/embed/' + id;
      }

      fetch(value)
        .then(response => response.text())
        .then(html => {
          document.querySelector('#webframe').srcdoc = html;
        })
        .catch(err => {
          console.log(err);

          // fallback to normal iframe loading
          document.querySelector('#webframe').src = value;
        });
    }
  });
});
  </script>
